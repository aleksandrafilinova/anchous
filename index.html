<html>
    <head>
        <title>Wordle</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="styles.css">
        <script src="scrypt.js"></script>
    </head>
    <body>
        <br>
        <div id="board"></div>
        <br>
        <h1 id="answer"></h1>
        <div id="keyboard"></div>
        <div id="menu">
    <div class="menu-content">
        <h1>WORDLE</h1>
        <h2>Статистика</h2>
        <p>Угадано слов: <span id="wins-count">0</span></p>
        <button id="start-btn">
            Начать игру
        </button>
                <h3>Тема</h3>
        <div class="theme-switch-wrapper">
            <span>☀️</span>
            <label class="theme-switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider round"></span>
            </label>
            <span>🌙</span>
        </div>
    </div>
</div>
 <div id="game-over-popup" class="popup">
        <div class="popup-content">
            <h2 id="popup-message">Игра окончена!</h2>
            <button id="restart-btn">Начать заново</button>
        </div>
    </div>
    </body>
</html>
